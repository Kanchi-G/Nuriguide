<!DOCTYPE html>
<html>
<head>
    <title>Nuriguide - Meal Recommendation</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<style>
    body {
    font-family: Arial;
    background: #e8f5e9;
    padding: 40px;
    text-align: center;
}

form {
    background: white;
    width: 350px;
    margin: auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px;
}

button {
    width: 100%;
    padding: 12px;
    background: #2e7d32;
    color: white;
    border: none;
    font-size: 16px;
}
</style>
<h2>Nuriguide Diet Recommendation System</h2>

<form action="/predict" method="POST">
    <label>Age:</label>
    <input type="number" name="age" required>

    <label>Height (cm):</label>
    <input type="number" name="height" required>

    <label>Weight (kg):</label>
    <input type="number" name="weight" required>

    <label>Gender:</label>
    <select name="gender">
        <option>Male</option>
        <option>Female</option>
    </select>

    <label>Disease:</label>
    <select name="disease">
        <option>None</option>
        <option>Diabetes</option>
        <option>Blood Pressure</option>
        <option>Thyroid</option>
    </select>

    <button type="submit">Get Meal Recommendation</button>
</form>

</body>
</html>
